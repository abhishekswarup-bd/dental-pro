name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─── BUILD ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint
        continue-on-error: true

      - name: Build (minify + optimize)
        run: npm run build

      - name: Copy blog and extra files to dist
        run: |
          # Copy root-level extra files
          for f in blog.html sitemap.xml search-index.js search.js robots.txt; do
            if [ -f "$f" ]; then
              cp -f "$f" dist/
              echo "Copied: $f"
            fi
          done
          # Copy blog/ folder — remove any existing dist/blog first to avoid nesting
          if [ -d "blog" ]; then
            rm -rf dist/blog
            mkdir -p dist/blog
            cp blog/*.html dist/blog/
            echo "Copied: blog/ ($(ls blog/*.html | wc -l) files)"
          fi
          # List dist contents for verification
          echo "--- dist/ contents ---"
          find dist -type f | sort

      - name: Report build size
        run: |
          echo "## Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/*; do
            size=$(du -h "$f" | cut -f1)
            echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          total=$(du -sh dist | cut -f1)
          echo "**Total: $total**" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ─── DEPLOY ──────────────────────────────────────────────
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
